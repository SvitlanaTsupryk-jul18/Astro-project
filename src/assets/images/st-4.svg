<svg width="74" height="61" viewBox="0 0 74 61" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
/* Shared 11.9s cycle, each icon starting 2s after the previous one:
   st-4 is last — its 1.4s choreography runs at 6.0-7.4s, then everything
   rests 4.5s before the chain restarts. */
.bar {
  transform-box: fill-box;
  transform-origin: center bottom;
  animation: 11.9s cubic-bezier(0.33, 1, 0.68, 1) infinite both;
}
.bar-1 { animation-name: st4-bar-1; }
.bar-2 { animation-name: st4-bar-2; }
.bar-3 { animation-name: st4-bar-3; }
.curve, .arrow {
  stroke-dasharray: 1;
  animation: 11.9s ease-out infinite both;
}
.curve { animation-name: st4-curve; }
.arrow { animation-name: st4-arrow; }
/* bars grow 0.5s each, staggered: 6.1s / 6.25s / 6.4s */
@keyframes st4-bar-1 {
  0%, 51.26% { transform: scaleY(0); }
  55.46%, 100% { transform: scaleY(1); }
}
@keyframes st4-bar-2 {
  0%, 52.52% { transform: scaleY(0); }
  56.72%, 100% { transform: scaleY(1); }
}
@keyframes st4-bar-3 {
  0%, 53.78% { transform: scaleY(0); }
  57.98%, 100% { transform: scaleY(1); }
}
/* curve draws 6.5s-7.2s */
@keyframes st4-curve {
  0%, 54.62% { stroke-dashoffset: 1; }
  60.5%, 100% { stroke-dashoffset: 0; }
}
/* arrowhead draws 7.1s-7.4s */
@keyframes st4-arrow {
  0%, 59.66% { stroke-dashoffset: 1; }
  62.18%, 100% { stroke-dashoffset: 0; }
}
@media (prefers-reduced-motion: reduce) {
  .bar, .curve, .arrow { animation: none; stroke-dashoffset: 0; }
}
</style>
