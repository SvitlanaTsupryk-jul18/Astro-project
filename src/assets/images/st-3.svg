<style>
/* Shared 11.9s cycle, each icon starting 2s after the previous one:
   st-3 is third — the dark quarter and its base lines slide from the
   icon's center into place at 4.0-4.8s. */
.wing {
  animation: st3-wing 11.9s cubic-bezier(0.33, 1, 0.68, 1) infinite both;
}
@keyframes st3-wing {
  0%, 33.61% { transform: translate(13.5px, -13px); opacity: 0; }
  34.45% { opacity: 1; }
  40.34%, 100% { transform: translate(0, 0); opacity: 1; }
}
@media (prefers-reduced-motion: reduce) {
  .wing { animation: none; }
}
</style>
