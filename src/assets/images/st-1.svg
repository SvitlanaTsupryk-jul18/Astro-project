<svg xmlns="http://www.w3.org/2000/svg" width="84" height="64" viewBox="0 0 84 64" fill="none">
<style>
/* Shared 11.9s cycle, each icon starting 2s after the previous one:
   st-1 is first — the drawing draws itself at 0-1.4s (outlines, then
   inner details, then the fingers one by one), then rests until restart. */
.o1, .o2, .f1, .f2, .f3 {
  stroke-dasharray: 1;
  animation: 11.9s ease-out infinite both;
}
.o1 { animation-name: st1-o1; }
.o2 { animation-name: st1-o2; }
.f1 { animation-name: st1-f1; }
.f2 { animation-name: st1-f2; }
.f3 { animation-name: st1-f3; }
.fill { animation: st1-fill 11.9s ease-out infinite both; }
/* big outlines draw 0-0.7s */
@keyframes st1-o1 {
  0% { stroke-dashoffset: 1; }
  5.88%, 100% { stroke-dashoffset: 0; }
}
/* inner details draw 0.2-0.9s */
@keyframes st1-o2 {
  0%, 1.68% { stroke-dashoffset: 1; }
  7.56%, 100% { stroke-dashoffset: 0; }
}
/* dark strip fades in 0.5-0.8s */
@keyframes st1-fill {
  0%, 4.2% { opacity: 0; }
  6.72%, 100% { opacity: 1; }
}
/* fingers draw one by one 0.7-1.3s */
@keyframes st1-f1 {
  0%, 5.88% { stroke-dashoffset: 1; }
  8.4%, 100% { stroke-dashoffset: 0; }
}
@keyframes st1-f2 {
  0%, 7.14% { stroke-dashoffset: 1; }
  9.66%, 100% { stroke-dashoffset: 0; }
}
@keyframes st1-f3 {
  0%, 8.4% { stroke-dashoffset: 1; }
  10.92%, 100% { stroke-dashoffset: 0; }
}
@media (prefers-reduced-motion: reduce) {
  .o1, .o2, .f1, .f2, .f3, .fill { animation: none; stroke-dashoffset: 0; opacity: 1; }
}
</style>
