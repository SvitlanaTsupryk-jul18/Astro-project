
<svg xmlns="http://www.w3.org/2000/svg" width="84" height="64" viewBox="0 0 84 64" fill="none">
  <style>
    /* Shared 11.9s cycle, each icon starting 2s after the previous one:
       st-2 is second — the little dark square scales in at 2.0-2.6s. */
    .pop {
      transform-box: fill-box;
      transform-origin: center;
      animation: st2-pop 11.9s cubic-bezier(0.34, 1.56, 0.64, 1) infinite both;
    }
    @keyframes st2-pop {
      0%, 16.81% { transform: scale(0); }
      21.85%, 100% { transform: scale(1); }
    }
    @media (prefers-reduced-motion: reduce) {
      .pop { animation: none; }
    }
    </style>
